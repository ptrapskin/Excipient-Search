<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Excipient Search{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a class="brand" href="/">Excipient Search</a>
            <p class="tagline">Live DailyMed product lookup with future-ready excipient intelligence architecture.</p>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/app.js') }}" defer></script>
</body>
</html>
